name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Configure npm
        shell: pwsh
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm cache clean --force
          npm --version
          node --version

      - name: Install dependencies
        shell: pwsh
        run: npm install --no-audit --no-fund --prefer-online --silent

      - name: Typecheck and integration tests
        shell: pwsh
        run: |
          npm run verify 2>&1 | Tee-Object -FilePath verify.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PresuControl-Verification-Log
          path: verify.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Build portable Windows application
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win portable --x64

      - name: Upload complete Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PresuControl-Empresarial-Windows-Completo
          path: |
            release/PresuControl-Empresarial-*-x64.exe
            release/win-unpacked/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
